[project]
name = "amfv-decomposer"
version = "0.0.1"
description = "Medical claim decomposition component for AMFV"
requires-python = ">=3.12"
dependencies = [
    "vllm>=0.17,<0.18",
    "spacy>=3.7",
    # VeriScore-original only (transformers + peft + bitsandbytes)
    "peft>=0.10",
    "bitsandbytes>=0.43",
    "accelerate>=0.27",
]

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.pytest.ini_options]
testpaths = ["test"]
